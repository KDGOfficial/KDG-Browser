<svg xmlns="http://www.w3.org/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glowing Orange Gradient -->
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9000" />
      <stop offset="50%" stop-color="#ff5e00" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>
    <!-- Purple/Magenta Neon Gradient -->
    <linearGradient id="purpleGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <!-- Drop Shadow Filter for Glow -->
    <filter id="neonFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cyber Shield Background Outline -->
  <path d="M256,40 L410,95 L410,240 C410,360 256,470 256,470 C256,470 102,360 102,240 L102,95 Z" 
        fill="none" stroke="url(#purpleGlow)" stroke-width="8" filter="url(#neonFilter)" opacity="0.8" />
        
  <!-- Controller Body -->
  <path d="M160,190 C120,190 90,220 90,270 C90,320 120,380 180,380 C210,380 230,360 256,360 C282,360 302,380 332,380 C392,380 422,320 422,270 C422,220 392,190 352,190 L160,190 Z" 
        fill="#141423" stroke="url(#orangeGlow)" stroke-width="12" filter="url(#neonFilter)" />

  <!-- D-Pad (Left Side) -->
  <path d="M140,260 L160,260 L160,240 L180,240 L180,260 L200,260 L200,280 L180,280 L180,300 L160,300 L160,280 L140,280 Z" 
        fill="url(#purpleGlow)" />
        
  <!-- Action Buttons (Right Side) -->
  <circle cx="320" cy="270" r="14" fill="#00f0ff" filter="url(#neonFilter)" />
  <circle cx="350" cy="240" r="14" fill="#ff5e00" filter="url(#neonFilter)" />
  <circle cx="350" cy="300" r="14" fill="#8a2be2" filter="url(#neonFilter)" />
  <circle cx="380" cy="270" r="14" fill="#39ff14" filter="url(#neonFilter)" />
  
  <!-- Analog Sticks (Thumbsticks) -->
  <circle cx="195" cy="325" r="24" fill="#222" stroke="url(#purpleGlow)" stroke-width="4" />
  <circle cx="195" cy="325" r="10" fill="url(#orangeGlow)" />
  
  <circle cx="317" cy="325" r="24" fill="#222" stroke="url(#purpleGlow)" stroke-width="4" />
  <circle cx="317" cy="325" r="10" fill="url(#orangeGlow)" />
  
  <!-- Select & Start Buttons -->
  <rect x="220" y="240" width="24" height="8" rx="4" transform="rotate(-15 220 240)" fill="url(#orangeGlow)" />
  <rect x="268" y="240" width="24" height="8" rx="4" transform="rotate(-15 268 240)" fill="url(#orangeGlow)" />
  
  <!-- Brand Glowing Circuit Paths -->
  <path d="M256,120 L256,170" stroke="url(#orangeGlow)" stroke-width="4" filter="url(#neonFilter)" />
  <path d="M220,120 L256,120 L280,140" fill="none" stroke="url(#purpleGlow)" stroke-width="4" />
</svg>
